<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mimi Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/layout.css">
<link rel="stylesheet" href="/static/css/components.css">
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-name">Mimi</span>
    <span class="brand-sub">Secretary Bot</span>
  </div>

  <div class="sidebar-nav">
    <a href="#dashboard" class="nav-item active" data-page="dashboard">

      <span>Dashboard</span>
    </a>
    <a href="#chat" class="nav-item" data-page="chat">
      <svg class="nav-item-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Chat</span>

    <div class="nav-group" data-group="tools">
      <button class="nav-group-label" type="button" aria-expanded="true">
        <svg class="nav-group-label-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        <span>Tools</span>
        <svg class="nav-group-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M3 4 L5 6 L7 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-group-items">
        <a href="#obs" class="nav-item" data-page="obs">OBS</a>
        <a href="#input-relay" class="nav-item" data-page="input-relay">Input Relay</a>
        <a href="#stt" class="nav-item" data-page="stt">STT</a>
        <a href="#activity" class="nav-item" data-page="activity">Activity</a>
        <a href="/tools/image-gen/" class="nav-item" target="_blank" rel="noopener">Image Gen ↗</a>
        <a href="/tools/zzz-disc/" class="nav-item" target="_blank" rel="noopener">ZZZ Disc ↗</a>
        <a href="#clip-pipeline" class="nav-item" data-page="clip-pipeline">Auto-Kirinuki</a>
      </div>
    </div>

    <div class="nav-group" data-group="mind">
      <button class="nav-group-label" type="button" aria-expanded="true">
        <svg class="nav-group-label-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5V20a2 2 0 0 1-4 0v-1a2 2 0 0 1-4-2v-1a2 2 0 0 1-1-3.5 2 2 0 0 1 1-3.5V8a2 2 0 0 1 2-2 2.5 2.5 0 0 1 3.5-4z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5V20a2 2 0 0 0 4 0v-1a2 2 0 0 0 4-2v-1a2 2 0 0 0 1-3.5 2 2 0 0 0-1-3.5V8a2 2 0 0 0-2-2 2.5 2.5 0 0 0-3.5-4z"/></svg>
        <span>Mind</span>
        <svg class="nav-group-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M3 4 L5 6 L7 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-group-items">
        <a href="#monologue" class="nav-item" data-page="monologue">Monologue</a>
        <a href="#memory" class="nav-item" data-page="memory">Memory</a>
        <a href="#innermind" class="nav-item" data-page="innermind">InnerMind</a>
      </div>
    </div>

    <div class="nav-group collapsed" data-group="units">
      <button class="nav-group-label" type="button" aria-expanded="false">
        <svg class="nav-group-label-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        <span>Units</span>
        <svg class="nav-group-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M3 4 L5 6 L7 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-group-items">
        <a href="#reminder" class="nav-item" data-page="reminder">Reminder</a>
        <a href="#todo" class="nav-item" data-page="todo">Todo</a>
        <a href="#memo" class="nav-item" data-page="memo">Memo</a>
        <a href="#timer" class="nav-item" data-page="timer">Timer</a>
        <a href="#weather" class="nav-item" data-page="weather">Weather</a>
        <a href="#rss" class="nav-item" data-page="rss">RSS</a>
      </div>
    </div>

    <div class="nav-group collapsed" data-group="system">
      <button class="nav-group-label" type="button" aria-expanded="false">
        <svg class="nav-group-label-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

      </button>
      <div class="nav-group-items">
        <a href="#settings" class="nav-item" data-page="settings">Settings</a>
        <a href="#logs" class="nav-item" data-page="logs">Logs</a>
        <a href="#docker-monitor" class="nav-item" data-page="docker-monitor">Docker Monitor</a>
        <a href="#gpu-status" class="nav-item" data-page="gpu-status">GPU Status</a>
        <a href="#maintenance" class="nav-item" data-page="maintenance">Maintenance</a>
      </div>
    </div>
  </div>

  <div class="sidebar-footer" id="sidebar-footer">---</div>
</nav>

<!-- Mobile overlay -->
<div id="sidebar-overlay"></div>

<!-- Main -->
<main id="app">
  <header id="topbar">
    <button id="menu-btn" aria-label="Menu">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/>
      </svg>
    </button>
    <h2 id="page-title">Dashboard</h2>
    <div class="topbar-status" id="topbar-status"></div>
  </header>
  <div id="main-content"></div>
</main>

<!-- Bottom-sheet (mobile Tools navigation) -->
<div id="nav-sheet-overlay"></div>
<aside id="nav-sheet" aria-hidden="true">
  <div class="sheet-handle" aria-hidden="true"></div>
  <div class="sheet-header">
    <h3>すべての機能</h3>
    <button class="sheet-close" type="button" aria-label="閉じる">×</button>
  </div>
  <div class="sheet-body">
    <!-- 内容は app.js で sidebar から複製 -->
  </div>
</aside>

<!-- Mobile bottom tab bar -->
<nav id="bottom-tabs" aria-label="主要ナビゲーション">
  <a href="#dashboard" class="tab" data-page="dashboard" aria-label="Dashboard">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
    <span class="tab-label">Home</span>
  </a>
  <a href="#chat" class="tab" data-page="chat" aria-label="Chat">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span class="tab-label">Chat</span>
  </a>
  <a href="#activity" class="tab" data-page="activity" aria-label="Activity">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span class="tab-label">Activity</span>
  </a>
  <button class="tab" id="tab-tools" type="button" aria-label="ツールを開く" aria-haspopup="dialog">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    <span class="tab-label">Tools</span>
  </button>
  <button class="tab" id="tab-more" type="button" aria-label="メニューを開く" aria-haspopup="menu">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    <span class="tab-label">More</span>
  </button>
</nav>

<!-- Toast -->
<div id="toast-container"></div>

<script type="module" src="/static/js/app.js"></script>

</html>

services:
  secretary-bot:
    image: ghcr.io/iniwa/secretary-bot:latest
    volumes:
      - /home/iniwa/docker/secretary-bot/app:/app/repo
      - /home/iniwa/docker/secretary-bot/app/src:/app/src
      - /home/iniwa/docker/secretary-bot/app/config.yaml:/app/config.yaml
      - /home/iniwa/docker/secretary-bot/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/iniwa/.ssh/id_ed25519:/home/botuser/.ssh/id_ed25519:ro
      - /home/iniwa/.ssh/known_hosts:/home/botuser/.ssh/known_hosts:ro
      - /home/iniwa/docker/secretary-bot/ssh_config:/home/botuser/.ssh/config:ro
    ports:
      - "8100:8100"
    env_file:
      - /home/iniwa/docker/secretary-bot/.env
    extra_hosts:
      - "gitea:host-gateway"
    group_add:
      - "985"  # docker group GID — Docker ソケットアクセス用
    restart: unless-stopped
    environment:
      - TZ=Asia/Tokyo
      - BOT_BASE_DIR=/app/repo
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
